<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inicio</title>

    <!-- BOOTSTRAP CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- BOOTSTRAP JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- ESTILOS PROPIOS -->
    <link rel="stylesheet" href="./assets/css/style.css">

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-sm bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="./index.html">Alky-Wallet</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link active" aria-current="page" href="./index.html">Inicio</a>
                    <a class="nav-link" href="./deposit.html">Depósito</a>
                    <a class="nav-link" href="./sendmoney.html">Enviar Dinero</a>
                    <a class="nav-link" href="./transactions.html">Transacciones</a>
                    <a class="nav-link" href="./login.html">Iniciar Sesión</a>
                </div>
            </div>
        </div>
    </nav>


    <!-- ENCABEZADO -->
    <header class="py-5">
        <h1 class="text-center">Bienvenido a Alky-Wallet, tu billetera digital</h1>
    </header>

    <main class="container">
        <div id="homepageCarousel" class="carousel slide" data-bs-ride="carousel" data-bs-interval="3000" data-bs-pause="false">
            <div class="carousel-inner text-center">
                <div class="carousel-item active">
                    <img src="./assets/img/imagen1.svg" class="d-block mx-auto img-fluid" alt="Dibujo transacciones">
                    <div class="carousel-caption">
                        <p class="fw-bolder">Transacciones seguras</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="./assets/img/imagen2.svg" class="d-block mx-auto img-fluid" alt="Dibujo administra dinero">
                    <div class="carousel-caption">
                        <p class="fw-bolder">Administra tu dinero</p>
                    </div>
                </div>
                <div class="carousel-item">
                    <img src="./assets/img/imagen3.svg" class="d-block mx-auto img-fluid" alt="Dibujo transfiere a contactos">
                    <div class="carousel-caption">
                        <p class="fw-bolder">Transfiere a tus contactos</p>
                    </div>
                </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#homepageCarousel" data-bs-slide="prev">
                <span class="carousel-control-prev-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Anterior</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#homepageCarousel" data-bs-slide="next">
                <span class="carousel-control-next-icon" aria-hidden="true"></span>
                <span class="visually-hidden">Siguiente</span>
            </button>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            var carouselElement = document.querySelector('#homepageCarousel');
            if (carouselElement && window.bootstrap) {
                var carousel = bootstrap.Carousel.getOrCreateInstance(carouselElement, {
                    interval: 3000,
                    ride: 'carousel',
                    pause: false
                });
                carousel.cycle();
            }
        });
    </script>

</body>

</html>
