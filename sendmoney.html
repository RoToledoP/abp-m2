<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar dinero</title>

    <!-- BOOTSTRAP CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">

    <!-- BOOTSTRAP JS -->
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>

    <!-- ESTILOS PROPIOS -->
    <link rel="stylesheet" href="./assets/css/style.css">

</head>

<body>

    <!-- NAVBAR -->
    <nav class="navbar navbar-expand-sm bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="./index.html">Alky-Wallet</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="./index.html">Inicio</a>
                    <a class="nav-link" href="./deposit.html">Depósito</a>
                    <a class="nav-link active" aria-current="page" href="./sendmoney.html">Enviar Dinero</a>
                    <a class="nav-link" href="./transactions.html">Transacciones</a>
                    <a class="nav-link" href="./login.html">Iniciar Sesión</a>
                </div>
            </div>
        </div>
    </nav>


    <!-- ENCABEZADO -->
    <header class="py-5">
        <h1 class="text-primary text-capitalize text-center">Realiza tus transferencias de forma segura</h1>
        <h3 class="text-center">Tu saldo actual: $<span id="balance">0</span></h3>
    </header>

    <main class="container">

        <section>

            <div class="row justify-content-center">
                <div class="col-12 col-sm-9 col-lg-7">

                    <form id="formSendMoney">
                        <div class="mb-3 position-relative">
                            <label for="buscarContacto" class="form-label">Buscar en la agenda de
                                contactos:</label>
                            <input type="text" class="form-control" id="buscarContacto" placeholder="Ingresar nombre de contacto" autocomplete="off">
                            <div id="autocompleteList" class="list-group position-absolute w-100 shadow-sm d-none" style="z-index: 10;"></div>
                        </div>
                        <div class="mb-3">
                            <button type="button" class="btn btn-primary" id="btnAgregarContacto" data-bs-toggle="modal" data-bs-target="#modalNuevoContacto">Agregar nuevo contacto</button>
                        </div>

                        <div>
                            <h2>Contactos registrados</h2>

                            <div class="mb-3">
                                <ul class="list-group" id="listaContactos">
                                </ul>

                            </div>

                        </div>

                        <div class="mb-3">
                            <label for="monto" class="form-label">Monto a transferir:</label>
                            <input type="number" class="form-control" id="monto" name="monto" placeholder="Ingresa el monto" required>
                        </div>

                        <div class="mb-3">
                            <input type="submit" class="btn btn-primary" value="Enviar dinero">
                        </div>

                    </form>

                </div>
            </div>

        </section>

    </main>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js" integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <!-- MODAL AGREGAR NUEVO CONTACTO -->
    <div class="modal fade" id="modalNuevoContacto" tabindex="-1" aria-labelledby="modalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="modalLabel">Agregar nuevo contacto</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <form id="formNuevoContacto">
                        <div class="mb-3">
                            <label for="nombreContacto" class="form-label">Nombre y Apellido:</label>
                            <input type="text" class="form-control" id="nombreContacto" name="nombre" placeholder="Ej: Juan Pérez" required>
                        </div>
                        <div class="mb-3">
                            <label for="cbuContacto" class="form-label">Número de CBU:</label>
                            <input type="text" class="form-control" id="cbuContacto" name="cbu" placeholder="Ej: 0123456789" required>
                        </div>
                        <div class="mb-3">
                            <label for="aliasContacto" class="form-label">Alias:</label>
                            <input type="text" class="form-control" id="aliasContacto" name="alias" placeholder="Ej: juan.perez" required>
                        </div>
                        <div class="mb-3">
                            <label for="bancoContacto" class="form-label">Nombre del Banco:</label>
                            <input type="text" class="form-control" id="bancoContacto" name="banco" placeholder="Ej: Banco Nacional" required>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                            <button type="submit" class="btn btn-primary">Guardar contacto</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- SCRIPT SENDMONEY -->
    <script src="./assets/js/sendmoney.js"></script>

</body>

</html>
